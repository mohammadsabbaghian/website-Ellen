<header class="site-header" id="site-header">
  <div class="container header-inner">
    <a href="/" class="logo" aria-label="Naar homepage">'t Kalverveen</a>

    <nav class="main-nav" id="main-nav" aria-label="Hoofdnavigatie">
      {{ range site.Menus.main }}
      <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} is-active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>

    <a href="mailto:{{ site.Params.email }}" class="header-contact" aria-label="E-mail ons">
      {{ site.Params.email }}
    </a>

    <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Menu openen">
      <span class="menu-icon"></span>
    </button>
  </div>
</header>
